name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ./package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v6
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Debug GitHub Pages API state
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            core.info(`Inspecting Pages state for ${owner}/${repo}`);

            try {
              const site = await github.request("GET /repos/{owner}/{repo}/pages", {
                owner,
                repo
              });
              core.info("Pages site config:");
              core.info(JSON.stringify(site.data, null, 2));
            } catch (error) {
              core.warning(`Unable to read Pages site config: ${error.message}`);
            }

            try {
              const deployments = await github.request("GET /repos/{owner}/{repo}/pages/deployments", {
                owner,
                repo
              });
              core.info("Recent Pages deployments:");
              core.info(JSON.stringify(deployments.data?.slice?.(0, 5) ?? deployments.data, null, 2));
            } catch (error) {
              core.warning(`Unable to read Pages deployments: ${error.message}`);
            }
